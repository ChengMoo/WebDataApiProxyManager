name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: crates/web/app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend lint
        run: bun run lint

      - name: Run frontend type check
        run: bunx tsc -b

      - name: Run frontend build
        run: bun run build

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Install backend system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Run cargo fmt
        run: cargo fmt --check

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  docker:
    name: Docker AMD64 Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Validate amd64 Docker build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: false
          platforms: linux/amd64
          tags: wdapm-ci:latest
